<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Register - Shaktipeeth Tourism</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Arial', sans-serif;
    }

    body {
      background: url('https://www.poojn.in/wp-content/uploads/2025/03/Baneswar-Shiva-Temple-A-Visitors-Guide-to-History-Significance.jpeg.jpg') no-repeat center center fixed;
      background-size: cover;
    }

    .header {
      background: rgba(255, 107, 107, 0.9);
      padding: 1rem;
      color: white;
      text-align: center;
      backdrop-filter: blur(2px);
    }

    .registration-form {
      max-width: 600px;
      margin: 2rem auto;
      padding: 2rem;
      background: rgba(255, 255, 255, 0.9);
      border-radius: 8px;
      box-shadow: 0 0 10px rgba(0,0,0,0.3);
    }

    .form-group {
      margin-bottom: 1.5rem;
    }

    label {
      display: block;
      margin-bottom: 0.5rem;
      font-weight: bold;
    }

    input, select, textarea {
      width: 100%;
      padding: 0.5rem;
      border: 1px solid #ddd;
      border-radius: 4px;
      font-size: 1rem;
    }

    .submit-btn {
      background: #ff6b6b;
      color: white;
      padding: 1rem 2rem;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      width: 100%;
      font-size: 1.1rem;
      transition: background 0.2s;
    }

    .submit-btn:hover:not(:disabled) {
      background: #ff5252;
    }

    .submit-btn:disabled {
      background: #ccc;
      cursor: not-allowed;
    }

    .msg-box {
      padding: 0.85rem 1rem;
      border-radius: 6px;
      margin-bottom: 1rem;
      font-size: 0.95rem;
      display: none;
    }
    .msg-box.success {
      background: #d4edda;
      color: #155724;
      border: 1px solid #c3e6cb;
      display: block;
    }
    .msg-box.error {
      background: #f8d7da;
      color: #721c24;
      border: 1px solid #f5c6cb;
      display: block;
    }

    .required {
      color: red;
    }

    @media (max-width: 768px) {
      .registration-form {
        margin: 1.5rem 10px;
        padding: 1.5rem;
      }
      .header h1 {
        font-size: 1.6rem;
      }
    }
  </style>
</head>
<body>
  <div class="header">
    <h1 data-i18n="reg.title">Shaktipeeth Tourism Registration</h1>
  </div>

  <main>
    <form class="registration-form">
      <div class="form-group">
        <label for="fullname">Full Name <span class="required">*</span></label>
        <input type="text" id="fullname" name="fullname" required placeholder="Enter your full name as per government ID" autocomplete="name" />
      </div>

      <div class="form-group">
        <label for="age">Age <span class="required">*</span></label>
        <input type="number" id="age" name="age" required min="18" max="120" placeholder="Enter your age" />
      </div>

      <div class="form-group">
        <label for="address">Address <span class="required">*</span></label>
        <textarea id="address" name="address" rows="3" required placeholder="Enter your complete address"></textarea>
      </div>

      <div class="form-group">
        <label for="idtype">Government ID Type <span class="required">*</span></label>
        <select id="idtype" name="idtype" required>
          <option value="">Select ID Type</option>
          <option value="aadhar">Aadhar Card</option>
          <option value="pan">PAN Card</option>
          <option value="voter">Voter ID</option>
          <option value="passport">Passport</option>
        </select>
      </div>

      <div class="form-group">
        <label for="idnumber">Government ID Number <span class="required">*</span></label>
        <input type="text" id="idnumber" name="idnumber" required placeholder="Enter your ID number" pattern="[A-Za-z0-9]{6,20}" title="Alphanumeric ID (6-20 characters)" />
      </div>

      <div class="form-group">
        <label for="mobile">Mobile Number <span class="required">*</span></label>
        <input type="tel" id="mobile" name="mobile" required pattern="[0-9]{10}" title="Enter a valid 10-digit mobile number" placeholder="Enter 10-digit mobile number" autocomplete="tel" />
      </div>

      <div class="form-group">
        <label for="email">Email Address <span class="required">*</span></label>
        <input type="email" id="email" name="email" required placeholder="Enter your email address" autocomplete="email" />
      </div>

      <div class="form-group">
        <label for="password">Password <span class="required">*</span></label>
        <input type="password" id="password" name="password" required placeholder="Choose a password (min 6 characters)" />
      </div>

      <div id="regMsg" class="msg-box"></div>
      <button type="submit" id="regBtn" class="submit-btn" data-i18n="reg.register">Register</button>
      <p style="margin-top:0.8rem;text-align:center;font-size:0.9rem;color:#555;">Already have an account? <a href="/login">Login here</a></p>
    </form>
  </main>

  <script>
    const regForm = document.querySelector('.registration-form');
    const regBtn  = document.getElementById('regBtn');
    const msgBox  = document.getElementById('regMsg');

    function showMsg(type, text) {
      msgBox.className = 'msg-box ' + type;
      msgBox.textContent = text;
      msgBox.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }

    function setLoading(loading) {
      regBtn.disabled = loading;
      regBtn.textContent = loading ? 'Registering...' : 'Register';
    }

    const handleSubmit = async (event) => {
      event.preventDefault();
      msgBox.className = 'msg-box'; // reset

      const form     = event.currentTarget;  // safe reference before async
      const fullname = document.getElementById('fullname').value.trim();
      const age      = document.getElementById('age').value;
      const address  = document.getElementById('address').value.trim();
      const idtype   = document.getElementById('idtype').value;
      const idnumber = document.getElementById('idnumber').value.trim();
      const mobile   = document.getElementById('mobile').value.trim();
      const email    = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;

      if (!fullname || !age || !address || !idtype || !idnumber || !mobile || !email || !password) {
        showMsg('error', 'Please fill all required fields.');
        return;
      }

      setLoading(true);

      try {
        const response = await fetch('/api/register', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          credentials: 'include',
          body: JSON.stringify({ fullname, age, address, idtype, idnumber, mobile, email, password })
        });

        const data = await response.json();
        console.log('📥 Server response:', data);

        if (!response.ok) {
          const errMsg = data.errors ? data.errors.join(' | ') : (data.message || 'Registration failed');
          throw new Error(errMsg);
        }

        showMsg('success', '✅ Registration successful! Redirecting to login...');
        form.reset();
        setTimeout(() => { window.location.href = '/login'; }, 1500);

      } catch (error) {
        console.error('❌ Registration error:', error);
        showMsg('error', '❌ ' + error.message);
        setLoading(false);
      }
    };

    if (regForm) {
      regForm.addEventListener('submit', handleSubmit);
    } else {
      console.error('❌ Registration form not found');
    }
  </script>
<script src="{{ url_for('static', filename='js/i18n.js') }}"></script>
</body>
</html>
