<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book Tour - Shaktipeeth Tourism</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background-color: #fff8e7;
            color: #333;
        }

        .header {
            background: linear-gradient(135deg, #ff6b6b, #d84315);
            color: white;
            text-align: center;
            padding: 1.5rem;
            font-size: 1.8rem;
            font-weight: bold;
        }

        .nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #d84315;
            padding: 1rem 5%;
        }

        .nav-links {
            display: flex;
            gap: 1.5rem;
        }

        .nav-links a {
            color: white;
            text-decoration: none;
            padding: 0.5rem 1rem;
        }

        .btn {
            background: #ff6b6b;
            color: white;
            padding: 0.6rem 1.2rem;
            border-radius: 5px;
            text-decoration: none;
        }

        .form-container {
            max-width: 800px;
            margin: 2rem auto;
            padding: 2rem;
            background: white;
            border-radius: 10px;
        }

        .form-group {
            margin-bottom: 1rem;
        }

        input, select, textarea {
            width: 100%;
            padding: 0.7rem;
            margin-top: 5px;
        }

        button {
            background: #ff6b6b;
            color: white;
            padding: 1rem;
            border: none;
            width: 100%;
            cursor: pointer;
        }

        .success-message {
            display: none;
            background: green;
            color: white;
            padding: 1rem;
            text-align: center;
        }

        @media (max-width: 768px) {
            .nav {
                flex-direction: column;
                align-items: stretch;
                padding: 1rem;
                gap: 12px;
            }
            .nav-links {
                overflow-x: auto;
                white-space: nowrap;
                padding-bottom: 5px;
                display: flex;
                gap: 8px;
                -webkit-overflow-scrolling: touch;
            }
            .nav-links::-webkit-scrollbar {
                display: none;
            }
            .nav-links a {
                padding: 6px 12px;
                font-size: 0.9rem;
            }
            .nav .btn {
                text-align: center;
                width: 100%;
                margin-top: 5px;
            }
            .header {
                font-size: 1.5rem;
                padding: 1.2rem;
            }
            .form-container {
                margin: 1rem;
                padding: 1rem;
            }
        }
    </style>
    <script>
        async function checkAuthAndRedirect() {
            try {
                const response = await fetch('/api/user-status', { credentials: 'include' });
                if (!response.ok) {
                    alert("To book a tour, you must log in first!");
                    window.location.href = '/login';
                    return;
                }
                const data = await response.json();
                if (!data.logged_in) {
                    alert("To book a tour, you must log in first!");
                    window.location.href = '/login';
                    return;
                }

                // If logged in, update the navbar dynamically
                const nav = document.querySelector('.nav');
                if (nav) {
                    const links = Array.from(nav.querySelectorAll('a'));
                    const loginLink = links.find(a => a.textContent.trim().toLowerCase() === 'login' || a.classList.contains('btn'));
                    const regLink = links.find(a => a.textContent.trim().toLowerCase() === 'registration');

                    if (loginLink) {
                        loginLink.textContent = 'Logout';
                        loginLink.href = '/logout';
                    }

                    if (regLink) {
                        regLink.textContent = `Welcome, ${data.user.name.split(' ')[0]}`;
                        regLink.href = '#';
                        regLink.style.pointerEvents = 'none';
                        regLink.style.opacity = '0.9';
                    }
                }

                // Autofill fields in the booking form using user's db details
                const form = document.getElementById("bookingForm");
                if (form) {
                    if (form.name && !form.name.value) form.name.value = data.user.name;
                    if (form.mobile && !form.mobile.value) form.mobile.value = data.user.mobile;
                    if (form.email && !form.email.value) form.email.value = data.user.email;
                }

            } catch (error) {
                console.error("Auth check failed:", error);
                alert("To book a tour, you must log in first!");
                window.location.href = '/login';
            }
        }
        document.addEventListener("DOMContentLoaded", checkAuthAndRedirect);
    </script>
</head>

<body>

<div class="header" data-i18n="book.title">Book Shaktipeeth Tour</div>

<!-- ✅ FIXED NAVBAR -->
<nav class="nav">
    <div class="nav-links">
        <a href="{{ url_for('home') }}" data-i18n="nav.home">Home</a>
        <a href="{{ url_for('register') }}" data-i18n="nav.registration">Registration</a>
        <a href="{{ url_for('about') }}" data-i18n="nav.about">About</a>
        <a href="{{ url_for('donation') }}" data-i18n="nav.donations">Donations</a>
        <a href="{{ url_for('sacred_map') }}" data-i18n="nav.map">Map</a>
    </div>
    <a href="{{ url_for('login') }}" class="btn" data-i18n="nav.login">Login</a>
</nav>

<div class="success-message" id="successMsg" data-i18n="book.success">
    Booking Successful!
</div>

<div class="form-container">
    <form id="bookingForm">

        <div class="form-group">
            <label data-i18n="book.package">Package</label>
            <select name="package" required>
                <option value="">Select</option>
                <option value="eastern">Eastern</option>
                <option value="northern">Northern</option>
                <option value="complete">Complete</option>
            </select>
        </div>

        <div class="form-group">
            <label data-i18n="book.traveldate">Travel Date</label>
            <input type="date" name="date" required>
        </div>

        <div class="form-group">
            <label data-i18n="book.travelers">Travelers</label>
            <input type="number" name="travelers" required min="1">
        </div>

        <div class="form-group">
            <label data-i18n="book.accommodation">Accommodation</label>
            <select name="accommodation">
                <option value="budget">Budget</option>
                <option value="standard">Standard</option>
                <option value="premium">Premium</option>
            </select>
        </div>

        <div class="form-group">
            <label data-i18n="book.requirements">Requirements</label>
            <textarea name="requirements"></textarea>
        </div>

        <div class="form-group">
            <label data-i18n="book.name">Name</label>
            <input type="text" name="name" required>
        </div>

        <div class="form-group">
            <label data-i18n="book.mobile">Mobile</label>
            <input type="text" name="mobile" required>
        </div>

        <div class="form-group">
            <label data-i18n="book.email">Email</label>
            <input type="email" name="email" required>
        </div>

        <button type="submit" data-i18n="book.booknow">Book Now</button>

    </form>
</div>

<script>
    // Booking Form Submission Handler
    document.getElementById("bookingForm").addEventListener("submit", async function(e) {
        e.preventDefault();

        const form = e.target;
        const data = {
            package: form.package.value,
            travel_date: form.date.value,
            num_travelers: form.travelers.value,
            accommodation: form.accommodation.value,
            special_requirements: form.requirements.value,
            name: form.name.value,
            mobile: form.mobile.value,
            email: form.email.value
        };

        try {
            const res = await fetch('/api/book', {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                credentials: 'include',
                body: JSON.stringify(data)
            });

            const result = await res.json();

            if (result.success) {
                document.getElementById("successMsg").style.display = "block";
                form.reset();
                // Retain user details from the session
                checkAuthAndRedirect();
                window.scrollTo({ top: 0, behavior: 'smooth' });
            } else {
                const errMsg = result.errors ? result.errors.join(', ') : (result.message || 'Booking failed');
                alert("Booking Error: " + errMsg);
            }

        } catch (err) {
            console.error('Booking error:', err);
            alert("Server error. Please try again.");
        }
    });
</script>
<script src="{{ url_for('static', filename='js/i18n.js') }}"></script>
</body>
</html>
