<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book Tour - Shaktipeeth Tourism</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background-color: #fff8e7;
            color: #333;
        }

        .header {
            background: linear-gradient(135deg, #ff6b6b, #d84315);
            color: white;
            text-align: center;
            padding: 1.5rem;
            font-size: 1.8rem;
            font-weight: bold;
        }

        .nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #d84315;
            padding: 1rem 5%;
        }

        .nav-links {
            display: flex;
            gap: 1.5rem;
        }

        .nav-links a {
            color: white;
            text-decoration: none;
            padding: 0.5rem 1rem;
        }

        .btn {
            background: #ff6b6b;
            color: white;
            padding: 0.6rem 1.2rem;
            border-radius: 5px;
            text-decoration: none;
        }

        .form-container {
            max-width: 800px;
            margin: 2rem auto;
            padding: 2rem;
            background: white;
            border-radius: 10px;
        }

        .form-group {
            margin-bottom: 1rem;
        }

        input, select, textarea {
            width: 100%;
            padding: 0.7rem;
            margin-top: 5px;
        }

        button {
            background: #ff6b6b;
            color: white;
            padding: 1rem;
            border: none;
            width: 100%;
            cursor: pointer;
        }

        .success-message {
            display: none;
            background: green;
            color: white;
            padding: 1rem;
            text-align: center;
        }
    </style>
</head>

<body>

<div class="header">Book Shaktipeeth Tour</div>

<!-- ✅ FIXED NAVBAR -->
<nav class="nav">
    <div class="nav-links">
        <a href="{{ url_for('home') }}">Home</a>
        <a href="{{ url_for('register') }}">Registration</a>
        <a href="{{ url_for('about') }}">About</a>
        <a href="{{ url_for('donation') }}">Donations</a>
        <a href="{{ url_for('sacred_map') }}">Map</a>
    </div>
    <a href="{{ url_for('login') }}" class="btn">Login</a>
</nav>

<div class="success-message" id="successMsg">
    Booking Successful!
</div>

<div class="form-container">
    <form id="bookingForm">

        <div class="form-group">
            <label>Package</label>
            <select name="package" required>
                <option value="">Select</option>
                <option value="eastern">Eastern</option>
                <option value="northern">Northern</option>
                <option value="complete">Complete</option>
            </select>
        </div>

        <div class="form-group">
            <label>Travel Date</label>
            <input type="date" name="date" required>
        </div>

        <div class="form-group">
            <label>Travelers</label>
            <input type="number" name="travelers" required min="1">
        </div>

        <div class="form-group">
            <label>Accommodation</label>
            <select name="accommodation">
                <option value="budget">Budget</option>
                <option value="standard">Standard</option>
                <option value="premium">Premium</option>
            </select>
        </div>

        <div class="form-group">
            <label>Requirements</label>
            <textarea name="requirements"></textarea>
        </div>

        <div class="form-group">
            <label>Name</label>
            <input type="text" name="name" required>
        </div>

        <div class="form-group">
            <label>Mobile</label>
            <input type="text" name="mobile" required>
        </div>

        <div class="form-group">
            <label>Email</label>
            <input type="email" name="email" required>
        </div>

        <button type="submit">Book Now</button>

    </form>
</div>

<script>
document.getElementById("bookingForm").addEventListener("submit", async function(e) {
    e.preventDefault();

    const form = e.target;

    const data = {
        package: form.package.value,
        travel_date: form.date.value,
        num_travelers: form.travelers.value,
        accommodation: form.accommodation.value,
        special_requirements: form.requirements.value,
        name: form.name.value,
        mobile: form.mobile.value,
        email: form.email.value
    };

    try {
        const res = await fetch("/api/book", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(data)
        });

        const result = await res.json();

        if (result.success) {
            document.getElementById("successMsg").style.display = "block";
            form.reset();
        } else {
            alert("Error: " + result.message);
        }

    } catch (err) {
        alert("Server error");
    }
});
</script>

</body>
</html>
