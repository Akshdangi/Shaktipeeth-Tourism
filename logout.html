<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Logged Out - Shaktipeeth Tourism</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Arial', sans-serif;
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #ff6b6b 0%, #ff9472 50%, #ffb900 100%);
            color: #333;
            padding: 20px;
        }

        .logout-container {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            padding: 3rem 2.5rem;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.15);
            width: 100%;
            max-width: 450px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.3);
            animation: fadeInUp 0.8s ease-in-out;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .icon-container {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #ff6b6b, #ffb900);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0 auto 1.5rem auto;
            box-shadow: 0 4px 15px rgba(255, 107, 107, 0.4);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% {
                transform: scale(1);
                box-shadow: 0 4px 15px rgba(255, 107, 107, 0.4);
            }
            50% {
                transform: scale(1.05);
                box-shadow: 0 6px 22px rgba(255, 107, 107, 0.6);
            }
            100% {
                transform: scale(1);
                box-shadow: 0 4px 15px rgba(255, 107, 107, 0.4);
            }
        }

        .icon-container svg {
            width: 40px;
            height: 40px;
            fill: white;
        }

        h2 {
            font-size: 1.8rem;
            color: #ff6b6b;
            margin-bottom: 0.5rem;
        }

        .subtitle {
            font-size: 1.1rem;
            color: #555;
            margin-bottom: 1.5rem;
            font-weight: bold;
        }

        .blessing-text {
            font-size: 0.95rem;
            color: #666;
            line-height: 1.5;
            margin-bottom: 2.5rem;
            font-style: italic;
        }

        .btn-group {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .btn {
            padding: 0.85rem;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            text-decoration: none;
            display: block;
            text-align: center;
        }

        .btn-primary {
            background: linear-gradient(135deg, #ff6b6b, #ff9472);
            color: white;
            border: none;
            box-shadow: 0 4px 10px rgba(255, 107, 107, 0.2);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 15px rgba(255, 107, 107, 0.35);
        }

        .btn-secondary {
            background: transparent;
            color: #ff6b6b;
            border: 2px solid #ff6b6b;
        }

        .btn-secondary:hover {
            background: #fff0ee;
            transform: translateY(-2px);
        }

        .btn:active {
            transform: translateY(0);
        }

        @media (max-width: 480px) {
            .logout-container {
                padding: 2rem 1.5rem;
            }
        }
    </style>
</head>
<body>
    <div class="logout-container">
        <div class="icon-container">
            <svg viewBox="0 0 24 24">
                <path d="M17 7l-1.41 1.41L18.17 11H8v2h10.17l-2.58 2.58L17 17l5-5zM4 5h8V3H4c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h8v-2H4V5z"/>
            </svg>
        </div>
        <h2 data-i18n="logout.title">Jai Mata Di! 🙏</h2>
        <div class="subtitle" data-i18n="logout.success">Logged Out Successfully</div>
        <p class="blessing-text">May the divine blessings of Goddess Sati and the sacred Shakti Peethas remain with you on your path. We look forward to guiding your next pilgrimage.</p>
        
        <div class="btn-group">
            <a href="login.html" id="loginAgainBtn" class="btn btn-primary" data-i18n="logout.loginagain">Log In Again</a>
            <a href="shaktipeeth-homepage.html" id="homeBtn" class="btn btn-secondary" data-i18n="logout.gohome">Return to Home</a>
        </div>
    </div>

    <script>
        // Check if running on Flask backend or statically
        const isFlaskOrigin = window.location.port === '8000';
        
        // Setup dynamic links based on origin
        document.getElementById('loginAgainBtn').href = isFlaskOrigin ? '/login' : 'login.html';
        document.getElementById('homeBtn').href = isFlaskOrigin ? '/' : 'shaktipeeth-homepage.html';

        // Auto trigger API logout just to ensure session is cleared on server side
        async function performApiLogout() {
            try {
                const logoutUrl = isFlaskOrigin ? '/api/logout' : 'http://127.0.0.1:8000/api/logout';
                await fetch(logoutUrl, { method: 'POST', credentials: 'include' });
            } catch (err) {
                console.error('API logout check error:', err);
            }
        }
        
        document.addEventListener('DOMContentLoaded', performApiLogout);
    </script>
<script src="static/js/i18n.js"></script>
</body>
</html>
