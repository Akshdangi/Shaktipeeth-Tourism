<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Shaktipeeth Tourism</title>

    <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Arial', sans-serif;
    }

    body {
      background: url('https://www.poojn.in/wp-content/uploads/2025/03/Baneswar-Shiva-Temple-A-Visitors-Guide-to-History-Significance.jpeg.jpg') no-repeat center center fixed;
      background-size: cover;
    }

    .header {
      background: rgba(255, 107, 107, 0.9);
      padding: 1rem;
      color: white;
      text-align: center;
      backdrop-filter: blur(2px);
    }

    .registration-form {
      max-width: 600px;
      margin: 2rem auto;
      padding: 2rem;
      background: rgba(255, 255, 255, 0.9);
      border-radius: 8px;
      box-shadow: 0 0 10px rgba(0,0,0,0.3);
    }

    .form-group {
      margin-bottom: 1.5rem;
    }

    label {
      display: block;
      margin-bottom: 0.5rem;
      font-weight: bold;
    }

    input, select, textarea ,button{
      width: 100%;
      padding: 0.5rem;
      border: 1px solid #ddd;
      border-radius: 4px;
      font-size: 1rem;
    }

    .submit-btn {
      background: #ff6b6b;
      color: white;
      padding: 1rem 2rem;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      width: 100%;
      font-size: 1.1rem;
    }

    .submit-btn:hover {
      background: #ff5252;
    }

    .required {
      color: red;
    }

    @media (max-width: 768px) {
      .registration-form {
        margin: 1.5rem 10px;
        padding: 1.5rem;
      }
    }
  </style>
</head>
<body>
    <div class="registration-form">
        <h2 data-i18n="login.title">Login to Your Account</h2>
        <form id="loginForm">
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" required placeholder="Enter your email">
            </div>
            
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" required placeholder="Enter your password">
            </div>

            <button type="submit" class="submit-btn" data-i18n="login.btn">Login</button>
            <p style="margin-top: 0.5rem; text-align: center; font-size: 0.9rem; color: #555;">Don't have an account? <a href="shaktipeeth-registration.html" id="registerLink" data-i18n="login.registerhere">Register here</a></p>
        </form>
    </div>
    
    <script>
        // Detect if we're on Flask origin or static file
        const isFlaskApp = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1';
        const port = window.location.port;
        const protocol = window.location.protocol;
        
        // Get proper API URL
        function getApiUrl(endpoint) {
            if (isFlaskApp && (port === '8000' || port === '8001' || port === '5000')) {
                return `${protocol}//${window.location.hostname}:${port}${endpoint}`;
            }
            return endpoint;
        }

        const handleLogin = async (event) => {
            event.preventDefault();
            
            const emailInput = document.getElementById('email').value.trim();
            const passwordInput = document.getElementById('password').value;
            
            if (!emailInput || !passwordInput) {
                alert('Please enter both email and password');
                return;
            }
            
            try {
                const apiUrl = getApiUrl('/api/login');
                console.log('📤 Logging in to:', apiUrl);
                
                const response = await fetch(apiUrl, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    credentials: 'include',
                    body: JSON.stringify({
                        email: emailInput,
                        password: passwordInput
                    })
                });
                
                const data = await response.json();
                console.log('📥 Server response:', data);
                
                if (!response.ok) {
                    throw new Error(data.message || 'Login failed');
                }
                
                console.log('✅ Login successful');
                window.location.href = isFlaskApp ? '/' : 'shaktipeeth-homepage.html';
            } catch (error) {
                console.error('❌ Login error:', error);
                alert('Login Error: ' + error.message);
            }
        };

        const loginForm = document.getElementById('loginForm');
        if (loginForm) {
            loginForm.addEventListener('submit', handleLogin);
        } else {
            console.error('❌ Login form not found');
        }
    </script>
<script src="static/js/i18n.js"></script>
</body>
</html>
